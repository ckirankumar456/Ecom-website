<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Child Element</title>
  </head>
  <body>
    <h1>Food Things</h1>
    <h3>Root vegetables</h3>
    <ul id="fruits">
      <li id="apple">Apple</li>
      <li id="orange">Orange</li>
      <li id="banana">Banana</li>
    </ul>
    <h3>Non-Root vegetables</h3>
    <ul id="vegetables">
      <li id="carrots">Carrots</li>
      <li id="onions">Onions</li>
      <li id="potatoes">Potatoes</li>
    </ul>
    <h3>Desserts</h3>
    <ul id="desserts">
      <li id="cake">Cake</li>
      <li id="pie">Pie</li>
      <li id="ice">Ice</li>
    </ul>
    <script src="childElement.js"></script>
  </body>
</html>
