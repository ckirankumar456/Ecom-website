<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <input
      type="text"
      onkeydown="handleKeyDown(event)"
      placeholder="Press any key"
    />
    <script>
      function handleKeyDown(event) {
        alert("key pressed: ", event.key);
      }
    </script>
  </body>
</html>
