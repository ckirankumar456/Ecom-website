<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #myButton {
        font-size: 2rem;
        margin: 10px;
        border: none;
        border-radius: 5px;
        padding: 10px;
      }
      .enabled {
        background-color: blue;
        color: white;
      }
      .hover {
        box-sizing: 0 0 10px black;
        font-weight: bold;
      }
      .disabled {
        background-color: green;
        color: wheat;
      }
    </style>
  </head>
  <body>
    <button id="myButton">My Button</button>
    <script src="classList_add.js"></script>
  </body>
</html>
