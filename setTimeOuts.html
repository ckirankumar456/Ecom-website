<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <img
      id="myImage"
      src="/12image.jpg.jpeg"
      alt=""
      width="300px"
      height="200px"
    /><br />
    <button onclick="change()">change image</button>

    <script>
      function change() {
        var image = document.getElementById("myImage");
        image.src = "/animal4.jpg.jpeg";
      }
    </script>
  </body>
</html>
