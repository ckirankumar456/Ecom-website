<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="counter.css" />
    <style>
      * {
        padding: 0;
        margin: 0;
      }
      #btnContainer {
        text-align: center;
      }
      #countable {
        display: block;
        text-align: center;
        font-size: 10em;
        font-family: Arial, Helvetica, sans-serif;
      }
      .btn {
        padding: 10px 20px;
        font-size: 1.5em;
        border-radius: 20px;
        cursor: pointer;
        background-color: gray;
        color: wheat;
      }
      .btn:hover {
        background-color: aqua;
        color: black;
        transition: 0.5s;
      }
    </style>
  </head>
  <body>
    <label for="" id="countable">0</label>
    <div id="btnContainer">
      <button id="increaseBtn" class="btn">Increase</button>
      <button id="resentBtn" class="btn">Resent</button>
      <button id="decreaseBtn" class="btn">Decrease</button>
    </div>
    <script src="counter.js"></script>
  </body>
</html>
