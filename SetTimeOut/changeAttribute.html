<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <img
      id="myImage"
      src="/animal1.jpg.jpeg"
      alt=""
      width="300px"
      height="200px"
    />
    <br />
    <button onclick="chageImage()">changeImage</button>
    <script>
      function chageImage() {
        var image = document.getElementById("myImage");
        image.setAttribute("src", "/animal3.jpg.jpeg");
      }
    </script>
  </body>
</html>
