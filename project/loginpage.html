<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login form</title>
    <link rel="stylesheet" href="loginpage.css" />
  </head>
  <body>
    <form action="loginpage.html" name="f1" id="container">
      <div class="usernm">
        <label for="username">username</label><br />
        <input type="text" id="username" name="username" />
      </div>
      <div class="phonenum">
        <label for="phonenumber">phone number</label><br />
        <input type="number" id="phonenumber" name="phonenumber" />
      </div>
      <div class="email">
        <label for="email_id">Email_id</label><br />
        <input type="text" id="email_id" name="email_id" />
      </div>
      <div class="passwords">
        <label for="password">password</label><br />
        <input type="password" id="password" name="password" />
      </div>
      <div class="submitbutton">
        <button id="submit" onclick="validate()">submit</button>
      </div>
      <div id="forgotpassword"><a href="#">forgotpassword?</a></div>
    </form>
    <script src="loginpage.js"></script>
  </body>
</html>
